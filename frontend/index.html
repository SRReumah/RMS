<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Restaurant Management System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: #333;
        }

        .btn {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 12px;
            font-size: 16px;
            color: white;
            background-color: #ff7b54;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff5722;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🍽 Restaurant Management System</h1>
    <h3>Welcome</h3>

    <button class="btn" onclick="location.href='customer_form.html'">
        Register Customer
    </button>

    <button class="btn" onclick="location.href='order_form.html'">
        Place Order
    </button>
    
     <button class="btn" onclick="location.href='menu_form.html'">
        Menu
    </button>

    <button class="btn" onclick="location.href='staff_form.html'">
        Staff
    </button>

    <button class="btn" onclick="location.href='payment_form.html'">
        Payment
    </button>
</div>

</body>
</html>
