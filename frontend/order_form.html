<!DOCTYPE html>
<html>
<head>
    <title>Place Order</title><style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
    }

    form {
        background: white;
        padding: 20px;
        width: 300px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    input, select, textarea {
        width: 90%;
        padding: 8px;
        margin: 5px;
    }

    input[type="submit"] {
        background: #ff7b54;
        color: white;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>

<h2>Restaurant Management System</h2>
<h3>Place Order</h3>

<form action="../backend/insert.php" method="post">

    <label>Customer ID:</label><br>
    <input type="number" name="cust_id" required><br><br>

    <label>Select Item:</label><br>
    <select name="item">
        <option value="Pizza">Pizza</option>
        <option value="Burger">Burger</option>
        <option value="Pasta">Pasta</option>
        <option value="Fried Rice">Fried Rice</option>
    </select><br><br>

    <label>Quantity:</label><br>
    <input type="number" name="qty" required><br><br>

    <input type="submit" value="Place Order">

</form>

</body>
</html>
