<!DOCTYPE html>
<html>
<head>
    <title>Customer Registration</title><style>
    body {
        font-family: Arial;
        background: #f4f4f4;
        text-align: center;
    }

    form {
        background: white;
        padding: 20px;
        width: 300px;
        margin: auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    input, select, textarea {
        width: 90%;
        padding: 8px;
        margin: 5px;
    }

        background: #ff7b54;

        border: none;

    }

<body>

<h2>Restaurant Management System</h2>
<h3>Customer Registration</h3>

<form action="../backend/insert.php" method="post">

    <label>Customer Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Phone Number:</label><br>
    <input type="text" name="phone" required><br><br>

    <input type="submit" value="Register Customer">

</form>

</html>
