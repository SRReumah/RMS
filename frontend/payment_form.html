<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Hungry Fork | Payment Management</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="navbar">
  <i class="fas fa-credit-card"></i>
  Payment Management
</div>

<div class="container">
  <form action="../backend/insert.php" method="post" id="paymentForm">
    <h3><i class="fas fa-receipt"></i> Process Payment</h3>
    
    <input name="payment_id" placeholder="Payment ID (e.g., PAY001)" autocomplete="off">
    <input name="order_id" placeholder="Order ID (e.g., ORD001)" required>
    <input name="amount" placeholder="Amount" type="number" step="0.01" required>
    
    <div class="payment-mode-group" id="modeGroup">
      <div class="mode-option">
        <input type="radio" name="payment_mode" value="Cash" id="modeCash" checked>
        <label for="modeCash"><i class="fas fa-money-bill-wave"></i> Cash</label>
      </div>
      <div class="mode-option">
        <input type="radio" name="payment_mode" value="UPI" id="modeUPI">
        <label for="modeUPI"><i class="fab fa-google-pay"></i> UPI</label>
      </div>
      <div class="mode-option">
        <input type="radio" name="payment_mode" value="Credit Card" id="modeCard">
        <label for="modeCard"><i class="fas fa-credit-card"></i> Credit Card</label>
      </div>
      <div class="mode-option">
        <input type="radio" name="payment_mode" value="Debit Card" id="modeDebit">
        <label for="modeDebit"><i class="fas fa-id-card"></i> Debit Card</label>
      </div>
      <div class="mode-option">
        <input type="radio" name="payment_mode" value="Other" id="modeOther">
        <label for="modeOther"><i class="fas fa-ellipsis-h"></i> Other</label>
      </div>
    </div>
    <div id="custom_mode_input" style="display: none; margin-top: 12px;">
      <input type="text" id="custom_mode_text" placeholder="Specify payment method (e.g., Gift Card, Net Banking)">
    </div>
    
    <div class="button-group">
      <input type="submit" value="Make Payment">
      <button type="button" class="back" onclick="location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
    </div>
    
    <div class="info-summary">
      <i class="fas fa-shield-alt"></i>
      <p>Secure transaction logging · Ensure Order ID exists before submission</p>
    </div>
  </form>
</div>

<script>
  (function() {
    const otherRadio = document.getElementById('modeOther');
    const customDiv = document.getElementById('custom_mode_input');
    const customTextInput = document.getElementById('custom_mode_text');
    const form = document.getElementById('paymentForm');
    
    function toggleCustomInput() {
      customDiv.style.display = otherRadio && otherRadio.checked ? 'block' : 'none';
    }
    
    document.querySelectorAll('input[name="payment_mode"]').forEach(radio => {
      radio.addEventListener('change', toggleCustomInput);
    });
    toggleCustomInput();
    
    form.addEventListener('submit', function(e) {
      if (otherRadio && otherRadio.checked && customTextInput.value.trim() === '') {
        e.preventDefault();
        alert('Please specify payment method in the "Other" field.');
        customTextInput.focus();
      } else if (otherRadio && otherRadio.checked && customTextInput.value.trim() !== '') {
        otherRadio.value = customTextInput.value.trim();
      }
    });
  })();
</script>
</body>
</html>
