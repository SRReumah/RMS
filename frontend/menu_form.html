<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Hungry Fork | Menu Management</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="navbar">
  <i class="fas fa-book-open"></i>
  Menu Management
</div>

<div class="container">
  <form action="../backend/insert.php" method="post">
    <h3><i class="fas fa-utensil-spoon"></i> Add Menu Item</h3>
    
    <input name="menu_id" placeholder="Menu ID (e.g., M001)" autocomplete="off">
    <input name="item_name" placeholder="Item Name" required>
    <input name="price" placeholder="Price (e.g., 299.99)" type="number" step="0.01" required>
    
    <div class="button-group">
      <input type="submit" value="Add Item">
      <button type="button" class="back" onclick="location.href='index.html'">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
      </button>
    </div>
  </form>
</div>

</body>
</html>
